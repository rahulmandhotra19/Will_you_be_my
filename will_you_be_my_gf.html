<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>For You ❤️</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      overflow: hidden;
      background: linear-gradient(135deg, #ffe6ec, #ffd1dc);
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    #giftScreen {
      text-align: center;
      z-index: 5;
    }

    .gift {
      font-size: 90px;
      cursor: pointer;
      animation: bounce 1.5s infinite;
    }

    #giftScreen p {
      margin-top: 10px;
      font-size: 20px;
      color: #c9184a;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }

    #message {
      display: none;
      font-size: 26px;
      color: #c9184a;
      text-align: center;
      padding: 20px;
      z-index: 5;
      max-width: 90%;
    }

    .container {
      display: none;
      text-align: center;
      background: white;
      padding: 35px 25px;
      border-radius: 24px;
      box-shadow: 0 10px 35px rgba(0, 0, 0, 0.15);
      width: 90%;
      max-width: 420px;
      z-index: 5;
      position: relative;
    }

    .container h2 {
      font-size: 38px;
      color: #7a1f3d;
      margin-bottom: 30px;
      line-height: 1.3;
    }

    .buttons {
      position: relative;
      height: 140px;
      width: 100%;
    }

    button {
      position: absolute;
      border: none;
      border-radius: 999px;
      padding: 14px 34px;
      font-size: 20px;
      cursor: pointer;
      transition: transform 0.2s ease, left 0.12s ease, top 0.12s ease;
      white-space: nowrap;
    }

    #yes {
      left: 50%;
      transform: translateX(-50%);
      background: #ff2f6d;
      color: white;
      top: 8px;
      box-shadow: 0 8px 20px rgba(255, 47, 109, 0.35);
    }

    #yes:active {
      transform: translateX(-50%) scale(0.96);
    }

    #no {
      background: #f6e7ee;
      color: #7a1f3d;
      top: 78px;
      left: 20%;
      border: 2px solid #f0bfd0;
      z-index: 12;
    }

    .heart {
      position: absolute;
      color: #ff4d6d;
      animation: float 6s linear infinite;
      pointer-events: none;
      z-index: 1;
    }

    @keyframes float {
      0% {
        transform: translateY(100vh) scale(0.7);
        opacity: 0;
      }
      20% {
        opacity: 1;
      }
      100% {
        transform: translateY(-10vh) scale(1.2);
        opacity: 0;
      }
    }

    #finalScreen {
      display: none;
      position: fixed;
      inset: 0;
      background: black;
      z-index: 20;
      overflow: hidden;
    }

    #fireworksCanvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .finalText {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: white;
      font-size: 34px;
      font-weight: bold;
      z-index: 25;
      padding: 20px;
      text-shadow: 0 0 12px rgba(255,255,255,0.8);
      pointer-events: none;
    }

    @media (max-width: 480px) {
      .container h2 {
        font-size: 30px;
      }

      button {
        font-size: 18px;
        padding: 12px 28px;
      }

      .finalText {
        font-size: 28px;
      }
    }
  </style>
</head>
<body>

  <div id="giftScreen">
    <div class="gift">🎁</div>
    <p>Tap to open</p>
  </div>

  <div id="message"></div>

  <div class="container" id="mainBox">
    <h2>Will you be my GF? 💖</h2>
    <div class="buttons">
      <button id="yes">Yes 💕</button>
      <button id="no">No 🙈</button>
    </div>
  </div>

  <div id="finalScreen">
    <canvas id="fireworksCanvas"></canvas>
    <div class="finalText">Yayyy ❤️<br>You said yes 💍✨</div>
  </div>

  <script>
    const gift = document.querySelector(".gift");
    const giftScreen = document.getElementById("giftScreen");
    const messageBox = document.getElementById("message");
    const mainBox = document.getElementById("mainBox");
    const noBtn = document.getElementById("no");
    const yesBtn = document.getElementById("yes");
    const finalScreen = document.getElementById("finalScreen");

    const text = "I have something special to ask you... ❤️";
    const texts = ["No 😜", "Pakad ke dikha 😏", "Nahi milega 😂", "Try again 😈"];

    let i = 0;
    let noMoveCount = 0;

    gift.onclick = () => {
      giftScreen.style.display = "none";
      messageBox.style.display = "block";
      typeText();
    };

    function typeText() {
      if (i < text.length) {
        messageBox.innerHTML += text.charAt(i);
        i++;
        setTimeout(typeText, 60);
      } else {
        setTimeout(() => {
          messageBox.style.display = "none";
          mainBox.style.display = "block";
          resetNoButton();
        }, 900);
      }
    }

    function resetNoButton() {
      noBtn.style.position = "absolute";
      noBtn.style.left = "20%";
      noBtn.style.top = "78px";
      noBtn.innerText = "No 🙈";
    }

    function moveNo() {
      if (mainBox.style.display !== "block") return;

      const padding = 12;
      const safeTop = 20;
      const viewportWidth = window.innerWidth;
      const viewportHeight = window.innerHeight;

      const maxX = viewportWidth - noBtn.offsetWidth - padding;
      const maxY = viewportHeight - noBtn.offsetHeight - padding;

      const randomX = Math.max(padding, Math.random() * maxX);
      const randomY = Math.max(safeTop, Math.random() * maxY);

      noBtn.style.position = "fixed";
      noBtn.style.left = `${randomX}px`;
      noBtn.style.top = `${randomY}px`;

      noBtn.innerText = texts[noMoveCount % texts.length];
      noMoveCount++;
    }

    noBtn.addEventListener("mouseenter", moveNo);

    noBtn.addEventListener("touchstart", (e) => {
      e.preventDefault();
      moveNo();
    }, { passive: false });

    yesBtn.addEventListener("click", () => {
      mainBox.style.display = "none";
      document.body.style.background = "black";
      finalScreen.style.display = "block";
      startFireworks();
    });

    function createHeart() {
      if (finalScreen.style.display === "block") return;
      const heart = document.createElement("div");
      heart.className = "heart";
      heart.innerHTML = "❤️";
      heart.style.left = Math.random() * 100 + "vw";
      heart.style.fontSize = (Math.random() * 22 + 12) + "px";
      document.body.appendChild(heart);
      setTimeout(() => heart.remove(), 6000);
    }

    setInterval(createHeart, 280);

    const canvas = document.getElementById("fireworksCanvas");
    const ctx = canvas.getContext("2d");
    let fireworksStarted = false;
    let particles = [];
    let animationId;

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    window.addEventListener("resize", resizeCanvas);
    resizeCanvas();

    class Particle {
      constructor(x, y, color, angle, speed) {
        this.x = x;
        this.y = y;
        this.color = color;
        this.angle = angle;
        this.speed = speed;
        this.alpha = 1;
        this.gravity = 0.04;
        this.friction = 0.985;
        this.vx = Math.cos(angle) * speed;
        this.vy = Math.sin(angle) * speed;
        this.size = Math.random() * 3 + 2;
      }

      update() {
        this.vx *= this.friction;
        this.vy *= this.friction;
        this.vy += this.gravity;
        this.x += this.vx;
        this.y += this.vy;
        this.alpha -= 0.012;
      }

      draw() {
        ctx.save();
        ctx.globalAlpha = this.alpha;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.fill();
        ctx.restore();
      }
    }

    function createExplosion(x, y) {
      const colors = [
        "#ff2d55", "#ffd60a", "#7df9ff", "#ffffff",
        "#ff9f1c", "#c77dff", "#00f5d4", "#ff4d6d"
      ];
      const color = colors[Math.floor(Math.random() * colors.length)];

      for (let i = 0; i < 80; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 6 + 2;
        particles.push(new Particle(x, y, color, angle, speed));
      }
    }

    function animateFireworks() {
      ctx.fillStyle = "rgba(0, 0, 0, 0.25)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      particles = particles.filter(p => p.alpha > 0);

      for (const p of particles) {
        p.update();
        p.draw();
      }

      animationId = requestAnimationFrame(animateFireworks);
    }

    function launchRandomFirework() {
      const x = Math.random() * canvas.width * 0.9 + canvas.width * 0.05;
      const y = Math.random() * canvas.height * 0.55 + canvas.height * 0.08;
      createExplosion(x, y);
    }

    function startFireworks() {
      if (fireworksStarted) return;
      fireworksStarted = true;
      ctx.fillStyle = "black";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      animateFireworks();

      launchRandomFirework();
      launchRandomFirework();
      launchRandomFirework();

      setInterval(() => {
        const burstCount = Math.floor(Math.random() * 2) + 1;
        for (let i = 0; i < burstCount; i++) {
          setTimeout(() => launchRandomFirework(), i * 220);
        }
      }, 700);
    }
  </script>
</body>
</html>
